<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Menús</title>

    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/menu_lista.css">
</head>

<body>

<header>
    <h1>MENÚ DEL RESTAURANTE</h1>
</header>

<div class="main-container">

    <!-- MENU LATERAL -->
    <div class="menu-container">
        <nav>
            <ul>
                <li><a href="/carrito/todos-los-pedidos"><i class="fas fa-utensils"></i> PEDIDOS</a></li>
                <li><a href="/usuarios/activos"><i class="fas fa-users"></i> USUARIOS</a></li>
                <li><a href="/adminMenu/listar"><i class='bx bx-bowl-hot'></i> MENUS</a></li>
                <li><a href="/reservas/listaReserva"><i class='fas fa-calendar-check'></i> RESERVAS</a></li>
                <li><a href="/mesas/disponibles"><i class="fas fa-table menu-icon"></i> MESAS</a></li>
                <li><a href="/opcionAdmin"><i class='bx bx-arrow-back'></i> SALIR</a></li>
            </ul>
        </nav>
    </div>

    <!-- CONTENIDO -->
    <div class="content">

        <button id="openModalBtn">Agregar Menú</button>

        <!-- ========================= -->
        <!-- MODAL CREAR -->
        <!-- ========================= -->
        <div id="addMenuModal" class="modal">

            <div class="modal-content">

                <span class="close" id="closeAddModalBtn">&times;</span>

                <form action="/adminMenu"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="text"
                           name="nombreDePlato"
                           placeholder="Nombre"
                           required>

                    <textarea name="descripcion"
                              placeholder="Descripción"></textarea>

                    <label for="precio">
                        Precio del plato
                    </label>

                    <input type="number"
                           id="precio"
                           name="precio"
                           step="0.01"
                           class="form-control"
                           placeholder="Ingrese el precio"
                           required>

                    <select name="categoria" required>
                        <option value="Entradas">Entradas</option>
                        <option value="Platos principales">Platos principales</option>
                        <option value="Postres">Postres</option>
                        <option value="Bebidas">Bebidas</option>
                    </select>

                    <input type="file"
                           name="imagen"
                           accept="image/*"
                           required>

                    <button type="submit">
                        Guardar
                    </button>

                </form>

            </div>

        </div>

        <!-- ========================= -->
        <!-- TABLA -->
        <!-- ========================= -->
        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Imagen</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="item : ${menus}">

                <td th:text="${item.id}"></td>
                <td th:text="${item.nombreDePlato}"></td>
                <td th:text="${item.categoria}"></td>
                <td th:text="${item.descripcion}"></td>
                <td th:text="${item.precio}"></td>

                <td>
                    <img th:src="@{${item.imagenUrl}}"
                         style="max-width:100px;">
                </td>

                <td>

                    <!-- ELIMINAR -->
                    <a th:href="@{/adminMenu/eliminar/{id}(id=${item.id})}">
                        <i class="fas fa-trash" style="color:red;"></i>
                    </a>

                    <!-- EDITAR -->
                    <button type="button"
                            class="editBtn"
                            th:data-id="${item.id}"
                            th:data-nombre="${item.nombreDePlato}"
                            th:data-descripcion="${item.descripcion}"
                            th:data-precio="${item.precio}"
                            th:data-categoria="${item.categoria}"
                            th:data-imagen="${item.imagenUrl}">

                        <i class="fas fa-edit"></i>

                    </button>

                </td>

            </tr>

            </tbody>

        </table>

        <!-- ========================= -->
        <!-- PAGINACIÓN -->
        <!-- ========================= -->
        <div>

            <a th:if="${currentPage > 0}"
               th:href="@{/adminMenu/listar(page=${currentPage - 1})}">
                Anterior
            </a>

            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">

                <a th:href="@{/adminMenu/listar(page=${i})}"
                   th:text="${i + 1}"
                   th:classappend="${i == currentPage} ? 'active'">
                </a>

            </span>

            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/adminMenu/listar(page=${currentPage + 1})}">
                Siguiente
            </a>

        </div>

    </div>
</div>

<!-- ========================= -->
<!-- MODAL EDITAR -->
<!-- ========================= -->
<div id="editMenuModal" class="modal">

    <div class="modal-content">

        <span class="close" id="closeEditModalBtn">&times;</span>

        <form id="editMenuForm"
              method="post"
              enctype="multipart/form-data">

            <input type="text"
                   id="editNombreDePlato"
                   name="nombreDePlato"
                   required>

            <textarea id="editDescripcion"
                      name="descripcion"></textarea>

            <input type="number"
                   id="editPrecio"
                   name="precio"
                   step="0.01"
                   required>

            <select id="editCategoria"
                    name="categoria"
                    required>

                <option value="Entradas">Entradas</option>
                <option value="Platos principales">Platos principales</option>
                <option value="Postres">Postres</option>
                <option value="Bebidas">Bebidas</option>

            </select>

            <input type="file"
                   name="imagen"
                   accept="image/*">

            <img id="editCurrentImage"
                 style="max-width:100px;">

            <input type="hidden"
                   id="editMenuId">

            <button type="submit">
                Actualizar
            </button>

        </form>

    </div>

</div>

<!-- ========================= -->
<!-- SCRIPT -->
<!-- ========================= -->
<script>

    const modalAdd = document.getElementById("addMenuModal");
    const modalEdit = document.getElementById("editMenuModal");

    /* =========================
       ABRIR MODAL AGREGAR
    ========================= */
    document.getElementById("openModalBtn").onclick = () => {
        modalAdd.classList.add("show");
    };

    /* =========================
       CERRAR MODAL AGREGAR
    ========================= */
    document.getElementById("closeAddModalBtn").onclick = () => {
        modalAdd.classList.remove("show");
    };

    /* =========================
       CERRAR MODAL EDITAR
    ========================= */
    document.getElementById("closeEditModalBtn").onclick = () => {
        modalEdit.classList.remove("show");
    };

    /* =========================
       CERRAR HACIENDO CLICK AFUERA
    ========================= */
    modalAdd.onclick = (e) => {
        if (e.target === modalAdd) {
            modalAdd.classList.remove("show");
        }
    };

    modalEdit.onclick = (e) => {
        if (e.target === modalEdit) {
            modalEdit.classList.remove("show");
        }
    };

    /* =========================
       ABRIR MODAL EDITAR
    ========================= */
    document.querySelectorAll(".editBtn").forEach(btn => {

        btn.addEventListener("click", function () {

            const id = this.dataset.id;

            document.getElementById("editNombreDePlato").value =
                this.dataset.nombre;

            document.getElementById("editDescripcion").value =
                this.dataset.descripcion;

            document.getElementById("editPrecio").value =
                this.dataset.precio;

            document.getElementById("editCategoria").value =
                this.dataset.categoria;

            document.getElementById("editCurrentImage").src =
                this.dataset.imagen;

            document.getElementById("editMenuId").value = id;

            document.getElementById("editMenuForm").action =
                `/adminMenu/editar/${id}`;

            modalEdit.classList.add("show");

        });

    });

</script>

</body>
</html>
